<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.productName} ?: 'Product Detail'">Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f8; color: #1f2937; }
        .top-nav { background: #111827; padding: 14px 0; }
        .top-nav a { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.25rem; }
        .page-card, .product-list-card, .desc-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        .product-list-card { overflow: hidden; }
        .list-title { padding: 14px 16px; border-bottom: 1px solid #e5e7eb; font-weight: 700; }
        .product-item { display: flex; gap: 10px; padding: 12px 16px; color: inherit; text-decoration: none; border-bottom: 1px solid #f3f4f6; }
        .product-item:hover, .product-item.active { background: #eff6ff; }
        .product-item img { width: 52px; height: 52px; object-fit: cover; border-radius: 10px; border: 1px solid #e5e7eb; }
        .product-name { font-size: 0.85rem; line-height: 1.35; }
        .product-price { color: #dc2626; font-weight: 700; font-size: 0.9rem; }
        .main-image-wrap { background: #f9fafb; border-radius: 16px; padding: 16px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
        .main-image-wrap img { width: 100%; height: 100%; object-fit: contain; }
        .thumb-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .thumb-list img { width: 68px; height: 68px; object-fit: cover; border-radius: 10px; border: 2px solid transparent; cursor: pointer; }
        .thumb-list img.active, .thumb-list img:hover { border-color: #2563eb; }
        .brand-badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #eff6ff; color: #1d4ed8; font-size: 0.8rem; font-weight: 700; }
        .price-box { margin-top: 18px; padding: 16px; border-radius: 14px; background: #fef2f2; border: 1px solid #fecaca; }
        .price-original { color: #6b7280; text-decoration: line-through; }
        .price-sale { color: #dc2626; font-size: 1.8rem; font-weight: 800; }
        .desc-card { padding: 24px; }
        .desc-card img { width: 100%; border-radius: 12px; margin-bottom: 12px; }
        .page-alert-wrap { position: sticky; top: 12px; z-index: 1055; }
        .card-option {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
        }
        .card-option + .card-option { margin-top: 10px; }
        .card-option.selected {
            border-color: #dc2626;
            background: #fef2f2;
        }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="container">
        <a href="/product/">Product Page</a>
    </div>
</nav>

<div class="container py-3">
    <div id="pageAlertWrap" class="page-alert-wrap"></div>
</div>

<div class="container pb-4">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="product-list-card">
                <div class="list-title">Products</div>
                <a class="product-item"
                   th:each="p : ${product.allProducts}"
                   th:href="@{/product/{id}(id=${p.productId})}"
                   th:classappend="${p.productId == product.productId} ? ' active' : ''">
                    <img th:src="${p.mainImageUrl != null and !#strings.isEmpty(p.mainImageUrl) ? p.mainImageUrl : 'https://via.placeholder.com/52x52?text=N/A'}"
                         th:alt="${p.productName}">
                    <div class="flex-grow-1">
                        <div class="product-name" th:text="${p.productName}">Product name</div>
                        <div class="product-price"
                             th:text="${p.salePrice != null ? #numbers.formatDecimal(p.salePrice, 0, 'COMMA', 0, 'POINT') + ' KRW' : 'Price unavailable'}">
                            Price
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="page-card p-4">
                <div class="row g-4">
                    <div class="col-md-5">
                        <div class="main-image-wrap">
                            <img id="mainImage"
                                 th:src="${#lists.isEmpty(product.mainImageUrls) ? 'https://via.placeholder.com/480x480?text=No+Image' : product.mainImageUrls[0]}"
                                 alt="Main product image">
                        </div>
                        <div class="thumb-list" id="thumbList" th:if="${not #lists.isEmpty(product.mainImageUrls)}">
                            <img th:each="imageUrl, stat : ${product.mainImageUrls}"
                                 th:src="${imageUrl}"
                                 th:alt="${'Product image ' + (stat.index + 1)}"
                                 th:classappend="${stat.first} ? ' active' : ''"
                                 onclick="changeMainImage(this)">
                        </div>
                    </div>

                    <div class="col-md-7">
                        <div class="brand-badge" th:text="${product.brand} ?: 'Unknown brand'">Brand</div>
                        <h1 class="mt-3 h3 fw-bold" th:text="${product.productName}">Product name</h1>

                        <div class="price-box">
                            <div class="price-original"
                                 th:if="${product.originalPrice != null}"
                                 th:text="${'Original ' + #numbers.formatDecimal(product.originalPrice, 0, 'COMMA', 0, 'POINT') + ' KRW'}">
                                Original
                            </div>
                            <div class="price-sale"
                                 th:text="${product.salePrice != null ? #numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT') + ' KRW' : 'Price unavailable'}">
                                Sale price
                            </div>
                            <div class="mt-2 text-secondary"
                                 th:text="${product.shippingFee != null ? 'Shipping ' + #numbers.formatDecimal(product.shippingFee, 0, 'COMMA', 0, 'POINT') + ' KRW' : 'Shipping unavailable'}">
                                Shipping
                            </div>
                        </div>

                        <div class="mt-4" th:if="${not #lists.isEmpty(product.options)}">
                            <label class="form-label fw-semibold">Options</label>
                            <select class="form-select" id="optionSelect" onchange="onOptionChange(this)">
                                <option value="">Select an option</option>
                                <option th:each="opt : ${product.options}"
                                        th:value="${opt.optionId}"
                                        th:text="${opt.optionDimensions}"
                                        th:attr="data-img=${opt.imageUrl}"
                                        th:selected="${opt.selected}">
                                    Option
                                </option>
                            </select>
                        </div>

                        <div class="mt-4">
                            <button class="btn btn-danger w-100 fw-bold py-2"
                                    th:attr="data-product-id=${product.productId},data-user-id=${product.userId},data-sale-price=${product.salePrice}"
                                    onclick="openBuyerModal(this)">
                                Order Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="desc-card mt-4" th:if="${not #lists.isEmpty(product.descriptionImageUrls)}">
                <h2 class="h5 fw-bold mb-3">Product Description</h2>
                <img th:each="imageUrl : ${product.descriptionImageUrls}"
                     th:src="${imageUrl}"
                     alt="Description image">
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="buyerModal" tabindex="-1" aria-labelledby="buyerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header" style="background: #111827; border-radius: 16px 16px 0 0;">
                <h5 class="modal-title text-white fw-bold" id="buyerModalLabel">주문자 정보 입력</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div id="buyerAlert" class="alert d-none" role="alert"></div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">이름 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="orderCustomerName" placeholder="홍길동">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">전화번호 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="orderCustomerPhone" placeholder="010-0000-0000">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">배송 주소 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="orderCustomerAddress" placeholder="서울시 강남구 테헤란로 123">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">개인통관고유부호 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="orderCustomsNumber" placeholder="P123456789012">
                </div>
                <div class="mb-0">
                    <label class="form-label fw-semibold">수량 <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="orderQuantity" value="1" min="1" max="99">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-danger fw-bold px-4" onclick="proceedToCardSelection()">다음</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="cardModal" tabindex="-1" aria-labelledby="cardModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header" style="background: #111827; border-radius: 16px 16px 0 0;">
                <h5 class="modal-title text-white fw-bold" id="cardModalLabel">결제 카드 선택</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div id="cardAlert" class="alert d-none" role="alert"></div>
                <div class="mb-3 rounded-3 bg-light p-3">
                    <div class="small text-secondary">결제 예정 금액</div>
                    <div id="cardTotalAmount" class="fw-bold fs-5">0 KRW</div>
                </div>
                <div id="cardList" class="d-grid gap-2"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="backToBuyerModal()">이전</button>
                <button type="button" class="btn btn-danger fw-bold px-4" onclick="submitOrder()">주문하기</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentProductId = null;
    let currentSellerUserId = null;
    let currentSalePrice = 0;
    let currentOrderDraft = null;

    const buyerModalEl = document.getElementById('buyerModal');
    const cardModalEl = document.getElementById('cardModal');

    function changeMainImage(thumb) {
        document.getElementById('mainImage').src = thumb.src;
        document.querySelectorAll('#thumbList img').forEach(function (img) {
            img.classList.remove('active');
        });
        thumb.classList.add('active');
    }

    function onOptionChange(select) {
        const option = select.options[select.selectedIndex];
        const imageUrl = option.dataset.img;
        if (imageUrl) {
            document.getElementById('mainImage').src = imageUrl;
        }
    }

    function openBuyerModal(btn) {
        currentProductId = Number(btn.dataset.productId);
        currentSellerUserId = Number(btn.dataset.userId);
        currentSalePrice = Number(btn.dataset.salePrice || 0);
        currentOrderDraft = null;

        document.getElementById('orderCustomerName').value = '';
        document.getElementById('orderCustomerPhone').value = '';
        document.getElementById('orderCustomerAddress').value = '';
        document.getElementById('orderCustomsNumber').value = '';
        document.getElementById('orderQuantity').value = '1';
        clearAlert('buyerAlert');
        clearAlert('cardAlert');
        document.getElementById('cardList').innerHTML = '';

        bootstrap.Modal.getOrCreateInstance(buyerModalEl).show();
    }

    function proceedToCardSelection() {
        const customerName = document.getElementById('orderCustomerName').value.trim();
        const customerPhone = document.getElementById('orderCustomerPhone').value.trim();
        const customerAddress = document.getElementById('orderCustomerAddress').value.trim();
        const customsNumber = document.getElementById('orderCustomsNumber').value.trim();
        const quantity = parseInt(document.getElementById('orderQuantity').value, 10);

        if (!customerName || !customerPhone || !customerAddress || !customsNumber || !quantity) {
            showAlert('buyerAlert', 'warning', '모든 항목을 입력해 주세요.');
            return;
        }
        if (quantity < 1) {
            showAlert('buyerAlert', 'warning', '수량은 1 이상이어야 합니다.');
            return;
        }

        currentOrderDraft = {
            userId: currentSellerUserId,
            dummyCoupangProductId: currentProductId,
            quantity: quantity,
            customerName: customerName,
            customerPhone: customerPhone,
            customerAddress: customerAddress,
            customsNumber: customsNumber
        };

        clearAlert('buyerAlert');
        loadCards();
    }

    function loadCards() {
        showAlert('cardAlert', 'secondary', '카드 정보를 불러오는 중입니다.');
        document.getElementById('cardList').innerHTML = '';
        document.getElementById('cardTotalAmount').textContent = formatCurrency(currentSalePrice * currentOrderDraft.quantity) + ' KRW';

        fetch('/cards?userId=' + encodeURIComponent(currentSellerUserId))
            .then(function (res) {
                if (!res.ok) {
                    return res.text().then(function (text) {
                        throw new Error(text || '카드 정보를 불러오지 못했습니다.');
                    });
                }
                return res.json();
            })
            .then(function (cards) {
                renderCards(cards || []);
                bootstrap.Modal.getOrCreateInstance(buyerModalEl).hide();
                bootstrap.Modal.getOrCreateInstance(cardModalEl).show();
            })
            .catch(function (err) {
                bootstrap.Modal.getOrCreateInstance(buyerModalEl).hide();
                showPageAlert('danger', err.message || '카드 정보를 불러오지 못했습니다.');
            });
    }

    function renderCards(cards) {
        const cardList = document.getElementById('cardList');
        cardList.innerHTML = '';

        if (!cards.length) {
            showAlert('cardAlert', 'warning', '상품 등록 사용자와 연결된 카드가 없습니다.');
            return;
        }

        clearAlert('cardAlert');

        cards.forEach(function (card, index) {
            const wrapper = document.createElement('label');
            wrapper.className = 'card-option';
            wrapper.innerHTML = `
                <input type="checkbox" class="form-check-input mt-1 card-check" value="${card.id}" ${index === 0 ? 'checked' : ''}>
                <div class="flex-grow-1">
                    <div class="fw-semibold">${escapeHtml(card.cardType || 'CARD')} / ${escapeHtml(card.cardNumber || '')}</div>
                    <div class="small text-secondary mt-1">잔액 ${formatCurrency(card.balance || 0)} KRW</div>
                    <div class="small text-secondary">한도 ${formatCurrency(card.cardLimit || 0)} KRW</div>
                    <div class="small ${card.active ? 'text-success' : 'text-danger'} mt-1">${card.active ? '사용 가능' : '비활성 카드'}</div>
                </div>
            `;
            cardList.appendChild(wrapper);
        });

        syncSelectedCardState();
        document.querySelectorAll('.card-check').forEach(function (checkbox) {
            checkbox.addEventListener('change', function () {
                if (this.checked) {
                    document.querySelectorAll('.card-check').forEach(function (other) {
                        if (other !== checkbox) {
                            other.checked = false;
                        }
                    });
                }
                syncSelectedCardState();
            });
        });
    }

    function backToBuyerModal() {
        bootstrap.Modal.getOrCreateInstance(cardModalEl).hide();
        bootstrap.Modal.getOrCreateInstance(buyerModalEl).show();
    }

    function submitOrder() {
        const selectedCard = document.querySelector('.card-check:checked');
        if (!selectedCard) {
            showAlert('cardAlert', 'warning', '결제 카드를 하나 선택해 주세요.');
            return;
        }

        clearAlert('cardAlert');

        const payload = {
            ...currentOrderDraft,
            cardId: Number(selectedCard.value)
        };

        fetch('/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(function (res) {
                if (!res.ok) {
                    return res.text().then(function (text) {
                        throw new Error(text || '주문 처리에 실패했습니다.');
                    });
                }
                return res.json();
            })
            .then(function (data) {
                bootstrap.Modal.getOrCreateInstance(cardModalEl).hide();

                if (data && data.success) {
                    showPageAlert('success', data.message || '주문과 결제가 완료되었습니다.');
                    return;
                }

                showPageAlert('danger', 'AutoSource 시스템을 이용한 상품 주문에 실패했습니다.');
            })
            .catch(function (err) {
                bootstrap.Modal.getOrCreateInstance(cardModalEl).hide();
                showPageAlert('danger', err.message || '주문 처리에 실패했습니다.');
            });
    }

    function syncSelectedCardState() {
        document.querySelectorAll('.card-option').forEach(function (item) {
            const checkbox = item.querySelector('.card-check');
            item.classList.toggle('selected', checkbox && checkbox.checked);
        });
    }

    function showAlert(elementId, type, message) {
        const alertEl = document.getElementById(elementId);
        alertEl.className = 'alert alert-' + type;
        alertEl.textContent = message;
    }

    function clearAlert(elementId) {
        const alertEl = document.getElementById(elementId);
        alertEl.className = 'alert d-none';
        alertEl.textContent = '';
    }

    function showPageAlert(type, message) {
        const wrap = document.getElementById('pageAlertWrap');
        wrap.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${escapeHtml(message)}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function formatCurrency(value) {
        return new Intl.NumberFormat('ko-KR').format(Number(value || 0));
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }
</script>
</body>
</html>
