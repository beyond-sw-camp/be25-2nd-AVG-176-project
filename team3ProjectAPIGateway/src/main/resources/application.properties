spring.application.name=team3ProjectAPIGateway
server.port=9000

# 앞단(Nginx 등)에서 오는 X-Forwarded-* 를 반영 (게이트웨이가 직접 외부에 붙어도 무방)
server.forward-headers-strategy=framework

# 백엔드로 넘기는 X-Forwarded-Host / Port / Proto (기본 true — 꺼져 있으면 302 Location 이 내부:808x 로 나갈 수 있음)
spring.cloud.gateway.x-forwarded.enabled=true
spring.cloud.gateway.x-forwarded.host-enabled=true
spring.cloud.gateway.x-forwarded.port-enabled=true
spring.cloud.gateway.x-forwarded.proto-enabled=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
# 프론트(Vite 등) http://localhost:5173 → 게이트웨이 9000 호출 시 브라우저 CORS 허용
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ===== JWT =====
jwt.secret=${JWT_SECRET:my-256-bit-secret-key-for-jwt-signing-and-verification}

# ===== Eureka =====
eureka.client.service-url.defaultZone=http://100.119.201.17:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=100.119.201.17
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# 503 시: 유레카에 USER-SERVICE / SOURCING-SERVICE 가 UP 인지 확인. 개발 중 등록 직후 캐시로 못 찾는 경우 완화
spring.cloud.loadbalancer.cache.enabled=false

# ===== Gateway Routes =====
# 이게 곧 우리가 만든 서비스들을 연결해주는 역할을 함.

# REST (/user/**) — UserApiController 등
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/user/**

# Sourcing Service
spring.cloud.gateway.routes[1].id=sourcing-service
spring.cloud.gateway.routes[1].uri=lb://SOURCING-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/sourcing/**

# Payment Service
spring.cloud.gateway.routes[2].id=payment-service
spring.cloud.gateway.routes[2].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/payment/**

# Shop Service
spring.cloud.gateway.routes[3].id=shop-service
spring.cloud.gateway.routes[3].uri=lb://SHOP-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/shop/**

# 화면·폼 + 로그인 성공 후 /loginHome (USER-SERVICE)
spring.cloud.gateway.routes[4].id=user-mvc-service
spring.cloud.gateway.routes[4].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/users/**

# User Home Service
spring.cloud.gateway.routes[5].id=user-home-service
spring.cloud.gateway.routes[5].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/

# Processing Service (/api/sourcing/ingest 는 /api/** 보다 먼저 매칭)
spring.cloud.gateway.routes[6].id=processing-service
spring.cloud.gateway.routes[6].uri=lb://PROCESSING-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/products/processing/**,/api/sourcing/ingest
spring.cloud.gateway.routes[6].order=-1

# Policy APIs currently served by the same backend
spring.cloud.gateway.routes[7].id=processing-policy-service
spring.cloud.gateway.routes[7].uri=lb://PROCESSING-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/policies/blocked-words/**

# OAuth2 시작 URL (/oauth2/authorization/kakao|naver 등) + 콜백 (/login/oauth2/code/kakao|naver 등)
spring.cloud.gateway.routes[8].id=user-oauth2
spring.cloud.gateway.routes[8].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/oauth2/**,/login/oauth2/**

# USER-SERVICE REST (/api/**) — /api/sourcing/ingest 는 아래 processing 이 order 로 우선
spring.cloud.gateway.routes[9].id=user-api
spring.cloud.gateway.routes[9].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/**
spring.cloud.gateway.routes[9].order=0

# Processing Service API 접근 경로
spring.cloud.gateway.routes[10].id=processing-service
spring.cloud.gateway.routes[10].uri=lb://processing-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/policies/**,/products/processing/**,/products/registrations/**,/products/coupang/**,/api/sourcing/**

# Order Processing Service
spring.cloud.gateway.routes[11].id=Order-Processing-Service
spring.cloud.gateway.routes[11].uri=lb://ORDER-PROCESSING-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/orders/**,/cards/**,/settlements/**,/shipping/**

