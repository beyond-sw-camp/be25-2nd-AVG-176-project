<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .signup-link { text-align: center; margin-top: 15px; }
        .error-message {
            color: #dc3545;
            background: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .field-error {
            color: #dc3545;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .input-error {
            border: 1px solid #dc3545;
        }
    </style>
</head>
<body>
    <h2>로그인</h2>

    <div th:if="${errorType}" class="error-message" th:text="${errorType.message}"></div>

    <form th:action="@{/users/login}" th:object="${loginRequest}" method="post">
        <input type="hidden" name="redirectURL" th:value="${redirectURL}">

        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" th:field="*{username}"
                   th:classappend="${errorType?.name() == 'USERNAME_NOT_FOUND'} ? 'input-error' : ''"
                   required>
            <div th:if="${errorType?.name() == 'USERNAME_NOT_FOUND'}" class="field-error" th:text="${errorType.message}"></div>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}"
                   th:classappend="${errorType?.name() == 'PASSWORD_MISMATCH'} ? 'input-error' : ''"
                   required>
            <div th:if="${errorType?.name() == 'PASSWORD_MISMATCH'}" class="field-error" th:text="${errorType.message}"></div>
        </div>

        <button type="submit">로그인</button>
    </form>

    <div class="signup-link">
        <a th:href="@{/users/signup}">회원가입</a>
    </div>
</body>
</html>
